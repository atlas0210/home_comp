<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home Comparison Preview</title>
  <style>
    :root {
      --font-sans: system-ui, sans-serif;
    }
    html, body {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      font-family: var(--font-sans);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    #status {
      padding: 12px 16px;
      color: #cbd5e1;
      font-size: 14px;
      border-bottom: 1px solid #1e293b;
      background: #111827;
    }
  </style>
</head>
<body>
  <div id="status">Loading preview...</div>
  <div id="root"></div>

  <script src="./vendor/react.development.js"></script>
  <script src="./vendor/react-dom.development.js"></script>
  <script src="./vendor/prop-types.min.js"></script>
  <script src="./vendor/recharts.min.js"></script>
  <script src="./vendor/babel.min.js"></script>
  <script>
    (async function renderPreview() {
      const status = document.getElementById("status");
      const rootEl = document.getElementById("root");
      let runtimeFailed = false;
      const showRuntimeError = (msg) => {
        runtimeFailed = true;
        status.textContent = "Preview runtime error: " + msg;
        status.style.display = "block";
      };

      window.addEventListener("error", (event) => {
        if (event && event.error) showRuntimeError(event.error.message || String(event.error));
      });
      window.addEventListener("unhandledrejection", (event) => {
        const reason = event && event.reason;
        showRuntimeError(reason && reason.message ? reason.message : String(reason));
      });

      try {
        if (!window.React || !window.ReactDOM || !window.PropTypes || !window.Babel || !window.Recharts) {
          const missing = [
            !window.React && "React",
            !window.ReactDOM && "ReactDOM",
            !window.PropTypes && "PropTypes",
            !window.Babel && "Babel",
            !window.Recharts && "Recharts"
          ].filter(Boolean).join(", ");
          throw new Error("Dependency scripts failed to load: " + missing);
        }

        const response = await fetch("./home-comp.jsx", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Could not read home-comp.jsx (" + response.status + ")");
        }

        const src = await response.text();
        const withoutImports = src.replace(/^\s*import[^\n]*\n/gm, "");
        const appFunction = withoutImports.replace(
          /export\s+default\s+function\s+App\s*\(/,
          "function App("
        );

        const prelude = [
          "const { useEffect, useMemo, useRef, useState } = React;",
          "const { ResponsiveContainer, BarChart, Bar, XAxis, YAxis, Tooltip, RadarChart, Radar, PolarGrid, PolarAngleAxis, Legend, Cell } = Recharts;"
        ].join("\n");

        const transformed = Babel.transform(
          prelude + "\n" + appFunction + "\nwindow.__HomeCompApp = App;",
          { presets: ["react"] }
        ).code;

        new Function(transformed)();
        ReactDOM.createRoot(rootEl).render(React.createElement(window.__HomeCompApp));
        if (!runtimeFailed) status.textContent = "Preview loaded.";
      } catch (error) {
        console.error(error);
        status.textContent =
          "Preview failed to load: " + (error && error.message ? error.message : String(error)) +
          " | Start a local server in this folder and open /preview.html (example: python -m http.server 4173).";
      }
    })();
  </script>
</body>
</html>
