<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Home Comparison Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: #0d1117;
      color: #e2e8f0;
      font-family: var(--font-sans);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overscroll-behavior: none;
    }
    #root {
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    #status {
      padding: 12px 16px;
      color: #94a3b8;
      font-size: 13px;
      font-family: var(--font-sans);
      border-bottom: 1px solid #1e293b;
      background: #0d1117;
    }
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a5568; }
    input[type="range"] {
      appearance: none;
      -webkit-appearance: none;
      height: 5px;
      border-radius: 99px;
      background: #1e293b;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6366f1;
      cursor: pointer;
      box-shadow: 0 0 0 3px #6366f122;
      transition: box-shadow 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 5px #6366f133;
    }
    select {
      background: #0d1117;
      color: #e2e8f0;
      border: 1px solid #2d3748;
      border-radius: 7px;
      padding: 7px 10px;
      font-family: var(--font-sans);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    select:hover, select:focus { border-color: #6366f1; }
    button { font-family: var(--font-sans); touch-action: manipulation; }
    textarea, input[type="text"], input[type="number"] { font-family: var(--font-sans); }
    select { touch-action: manipulation; }
    @media (max-width: 640px) {
      ::-webkit-scrollbar { width: 4px; height: 4px; }
    }
  </style>
</head>
<body>
  <div id="status">Loading app...</div>
  <div id="root"></div>

  <script src="./vendor/react.development.js?v=20260317d"></script>
  <script src="./vendor/react-dom.development.js?v=20260317d"></script>
  <script src="./vendor/prop-types.min.js?v=20260317d"></script>
  <script src="./vendor/recharts.min.js?v=20260317d"></script>
  <script type="module" src="./main-loader.js?v=20260318a"></script>
</body>
</html>
